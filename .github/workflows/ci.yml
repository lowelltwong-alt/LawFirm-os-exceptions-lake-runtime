name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Default contract repository for CI. The canonical substrate machine name is
    # `LawFirm-os-semantic-substrate` (see substrate governance/CROSS_REPO_MAP.md).
    # Forks may override this single env default to point at their substrate fork.
    env:
      CONTRACT_ONTOLOGY_REPOSITORY: lowelltwong-alt/LawFirm-os-semantic-substrate
    steps:
      - name: Checkout runtime repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Contract lock sanity check (read-only)
        run: python scripts/ci_check_contract_lock.py

      - name: Read pinned contract SHA from lock file
        id: contract_pin
        run: |
          SHA=$(python -c "import json; print(json.load(open('contracts.lock.json'))['contract_sha'].strip())")
          echo "contract_sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Law Firm OS Semantic Substrate at pinned SHA (public, no firm data)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONTRACT_ONTOLOGY_REPOSITORY }}
          ref: ${{ steps.contract_pin.outputs.contract_sha }}
          path: LawFirm-os-semantic-substrate

      - name: Run tests
        env:
          EXCEPTIONS_LAKE_CONTRACT_REPO_PATH: ${{ github.workspace }}/LawFirm-os-semantic-substrate
        run: python -m pytest
