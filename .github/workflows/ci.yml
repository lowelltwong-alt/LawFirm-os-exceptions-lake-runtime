name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Default contract repository for CI. Forks may override via repository variables
    # or by changing this single env default (see README).
    env:
      CONTRACT_ONTOLOGY_REPOSITORY: your-org/law-firm-ontology
    steps:
      - name: Checkout runtime repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Contract lock sanity check (read-only)
        run: python scripts/ci_check_contract_lock.py

      - name: Read pinned contract SHA from lock file
        id: contract_pin
        run: |
          SHA=$(python -c "import json; print(json.load(open('contracts.lock.json'))['contract_sha'].strip())")
          echo "contract_sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Law Firm ontology contract repo at pinned SHA (public, no firm data)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONTRACT_ONTOLOGY_REPOSITORY }}
          ref: ${{ steps.contract_pin.outputs.contract_sha }}
          path: law-firm-ontology-contracts

      - name: Run tests
        env:
          EXCEPTIONS_LAKE_CONTRACT_REPO_PATH: ${{ github.workspace }}/law-firm-ontology-contracts
        run: python -m pytest
